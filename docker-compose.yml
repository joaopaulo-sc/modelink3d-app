services:
  db:
    image: postgres:16-alpine
    container_name: modelink_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modelink123}
      POSTGRES_DB: ${POSTGRES_DB:-modelink3d}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modelink}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: modelink_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-modelink}:${POSTGRES_PASSWORD:-modelink123}@db:5432/${POSTGRES_DB:-modelink3d}
      SECRET_KEY: ${SECRET_KEY:-changeme-use-openssl-rand-hex-32}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@modelink.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: modelink_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # URL interna Docker para fetches server-side (Server Components)
      API_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
