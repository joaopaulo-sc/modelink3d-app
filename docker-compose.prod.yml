services:
  traefik:
    image: traefik:v3.7
    container_name: modelink_traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # Redireciona http → https (Cloudflare já entrega HTTP, mas caso acesse direto)
      - --entrypoints.web.http.redirections.entrypoint.to=web
      - --entrypoints.web.http.redirections.entrypoint.scheme=http
      - --log.level=WARN
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: postgres:16-alpine
    container_name: modelink_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modelink123}
      POSTGRES_DB: ${POSTGRES_DB:-modelink3d}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modelink} -d ${POSTGRES_DB:-modelink3d}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: bluesball/modelink:backend
    container_name: modelink_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-modelink}:${POSTGRES_PASSWORD:-modelink123}@db:5432/${POSTGRES_DB:-modelink3d}
      SECRET_KEY: ${SECRET_KEY:-changeme-use-openssl-rand-hex-32}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@modelink3d.link}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-troque-esta-senha}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.modelink3d.link`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    image: bluesball/modelink:frontend-prod
    container_name: modelink_frontend
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`modelink3d.link`) || Host(`www.modelink3d.link`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  uploads_data:
